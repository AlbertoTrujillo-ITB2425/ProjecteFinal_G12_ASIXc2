version: '3.8'

# 1. PLANTILLA BASE (Nodos Web y Scanner)
x-app-base: &app_base
  build:
    context: .
    dockerfile: Dockerfile
  restart: always
  volumes:
    - ./g7_src:/var/www/html
    - ./config/php-sessions.ini:/usr/local/etc/php/conf.d/sessions.ini
  environment:
    - DB_HOST=s4_mariadb
    - DB_NAME=${DB_NAME}
    - DB_USER=${DB_USER}
    - DB_PASSWORD=${DB_PASSWORD}
    - REDIS_HOST=s5_redis
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - LDAP_HOST=s6_openldap
    - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}

services:

  # S1: Gateway & Load Balancer
  s1_nginx:
    image: nginx:1.24-alpine
    container_name: s1_nginx
    ports:
      - "8080:80"
    volumes:
      - ./g7_src:/var/www/html:ro
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - net_public
      - net_private
    restart: always
    depends_on:
      - s2_node
      - s3_node

  # S2 & S3: Web Nodes
  s2_node:
    <<: *app_base
    container_name: s2_node
    networks:
      - net_public
      - net_private

  s3_node:
    <<: *app_base
    container_name: s3_node
    networks:
      - net_public
      - net_private

  # S4: Database Persistence
  s4_mariadb:
    image: mariadb:10.11
    container_name: s4_mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - net_private
    restart: always

  # S5: Cache & Session Manager
  s5_redis:
    image: redis:7-alpine
    container_name: s5_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - net_private
    restart: always

  # S6: Identity & Directory (LDAP)
  s6_openldap:
    image: osixia/openldap:1.5.0
    container_name: s6_openldap
    environment:
      - LDAP_ORGANISATION="CyberAudit Group 7"
      - LDAP_DOMAIN="g7.local"
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
    volumes:
      - ./ldap_data:/var/lib/ldap
    networks:
      - net_private
    restart: always

  # S7: SIEM
  s7_wazuh:
    image: wazuh/wazuh-manager:4.7.2
    container_name: s7_wazuh
    ports:
      - "1514:1514"
      - "55000:55000"
    networks:
      - net_private

  # S8: Metrics & Analytics
  s8_grafana:
    image: grafana/grafana:10.2.3
    container_name: s8_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-admin123}
    networks:
      - net_private

  # S9: Auditoría & Recon (Ahora usa el Dockerfile unificado de PHP)
  s9_scanner:
    <<: *app_base
    container_name: s9_scanner
    environment:
      - DB_HOST=s4_mariadb
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=s5_redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - LDAP_HOST=s6_openldap
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
      - SHODAN_API_KEY=${SHODAN_API_KEY}
      - NODE_NAME=s9_scanner_engine
    networks:
      - net_public
      - net_private
    cap_add:
      - NET_RAW
      - NET_ADMIN

  # S10: Postfix (Usa el nuevo Dockerfile.s10_s11)
  s10_postfix:
    build:
      context: .
      dockerfile: Dockerfile.s10_s11
    container_name: s10_postfix
    ports:
      - "25:25"
      - "587:587"
    volumes:
      - ./mail_logs:/var/log/mail
    networks:
      - net_private
    restart: always

  # S11: Snort (Usa el MISMO Dockerfile que el S10)
  s11_snort:
    build:
      context: .
      dockerfile: Dockerfile.s10_s11
    container_name: s11_snort
    command: snort -A console -i eth0 -c /etc/snort/snort.conf
    volumes:
      - ./snort_logs:/var/log/snort
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - net_private
    restart: always
    depends_on:
      - s1_nginx

# 2. DEFINICIÓN DE REDES
networks:
  net_public:
    driver: bridge
  net_private:
    driver: bridge
    internal: true
