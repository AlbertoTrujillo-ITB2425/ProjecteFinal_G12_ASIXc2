
# =========================================================================
# PROYECTO: CYBERPYME SOC DASHBOARD v3.0
# OPTIMIZACIÓN: Cluster Balanceado + Persistencia Redis + Proxy Inverso
# =========================================================================

services:

  # --- S1: GATEWAY & LOAD BALANCER ---
  # Gestiona SSL, tráfico Cloudflare y balanceo entre nodos s2 y s3.
  s1_nginx:
    image: nginx:1.24-alpine
    container_name: s1_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www/html:ro
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - net_public
      - net_private
    restart: always
    depends_on:
      - s2_node
      - s3_node
      - s5_redis
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- S2: WEB NODE ALPHA (PHP-FPM) ---
  s2_node:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: s2_node
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
    volumes:
      - ./src:/var/www/html
    networks:
      - net_private
      - net_public
    restart: always

  # --- S3: WEB NODE BETA (PHP-FPM) ---
  s3_node:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: s3_node
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
    volumes:
      - ./src:/var/www/html
    networks:
      - net_private
      - net_public
    restart: always

  # --- S4: DATABASE (MariaDB) ---
  s4_mariadb:
    image: mariadb:10.11
    container_name: s4_mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - net_private
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # --- S5: REDIS (Session Handler & Cache) ---
  # Crucial para que el F5 no cierre la sesión en el cluster.
  s5_redis:
    image: redis:7-alpine
    container_name: s5_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - ./redis_data:/data
    networks:
      - net_private
    restart: always

  # --- S6: DIRECTORY SERVICE (LDAP) ---
  s6_openldap:
    image: osixia/openldap:1.5.0
    container_name: s6_openldap
    environment:
      - LDAP_ORGANISATION="CyberAudit Group 7"
      - LDAP_DOMAIN="g7.local"
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
    volumes:
      - ./ldap_data:/var/lib/ldap
      - ./ldap_config:/etc/ldap/slapd.d
    networks:
      - net_private
    restart: always

  # --- S7: SIEM MANAGER (Wazuh) ---
  s7_wazuh:
    image: wazuh/wazuh-manager:4.7.2
    container_name: s7_wazuh
    ports:
      - "1514:1514"
      - "55000:55000"
    environment:
      - INDEXER_URL=https://s7_wazuh:9200
    networks:
      - net_private
    restart: always

# --- S8: TELEMETRY (Grafana) ---
  s8_grafana:
    image: grafana/grafana:10.2.3
    container_name: s8_grafana
    user: "472"
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-admin123}
      - GF_SERVER_DOMAIN=3.215.30.52
      # Al poner la IP aquí, Grafana aceptará conexiones directas
      - GF_SERVER_ROOT_URL=http://3.215.30.52:3000/
      # Ponemos esto en FALSE si vas a entrar por IP directamente sin el prefijo /grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./grafana_data:/var/lib/grafana
    networks:
      - net_private
    restart: always

  s9_scanner:
    build: .
    container_name: s9_scanner
    volumes:
      - ./src:/var/www/html
    env_file: .env
    networks:
      - net_public
      - net_private
    cap_add:
      - NET_RAW
      - NET_ADMIN
    restart: always

  # --- S10: MAIL GATEWAY (Postfix) ---
  s10_postfix:
    build:
      context: .
      dockerfile: Dockerfile.s10_s11
    container_name: s10_postfix
    ports:
      - "25:25"
      - "587:587"
    networks:
      - net_private
    restart: always

  # --- S11: IDS/IPS (Snort) ---
  s11_snort:
    build:
      context: .
      dockerfile: Dockerfile.s10_s11
    container_name: s11_snort
    command: snort -A console -i eth0 -c /etc/snort/snort.conf
    volumes:
      - ./snort_logs:/var/log/snort
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - net_private
    restart: always

  # --- S12: AI ENGINE (Ollama) ---
  s12_ollama:
    image: ollama/ollama:latest
    container_name: s12_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    networks:
      - net_public
      - net_private
    restart: always

# =========================================================================
# SEGURIDAD DE RED
# =========================================================================
networks:
  net_public:
    driver: bridge
    labels:
      com.docker.network.bridge.name: "br_soc_pub"
  net_private:
    driver: bridge
    internal: false 
    labels:
      com.docker.network.bridge.name: "br_soc_priv"

# =========================================================================
# VOLÚMENES PERSISTENTES (Mapeo a carpetas locales)
# =========================================================================
volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  ldap_data:
    driver: local
  ldap_config:
    driver: local
  grafana_data:
    driver: local
  ollama_data:
    driver: local
  snort_logs:
    driver: local
