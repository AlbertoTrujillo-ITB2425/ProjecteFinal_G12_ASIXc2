services:
  cyberaudit-firewall:
    image: bunkerity/bunkerweb:latest
    container_name: cyberaudit-firewall
    ports:
      - 8080:8080
    environment:
      - SERVER_NAME=
      - MULTISITE=no
      - USE_REVERSE_PROXY=yes
      - REVERSE_PROXY_URL=/
      - REVERSE_PROXY_HOST=http://nginx:80
      - SERVE_FILES=no
      - AUTO_LETS_ENCRYPT=no
      - USE_MODSECURITY=yes
      - USE_MODSECURITY_CRS=yes
      - LOG_LEVEL=info
      - LISTEN_HTTP=yes
      - HTTP_PORT=8080
    networks:
      - net_public
    restart: always
    depends_on:
      - nginx

  nginx:
    image: nginx:1.24-alpine
    container_name: cyberaudit-nginx
    volumes:
      - ./g7_src:/var/www/html:ro
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - net_public
      - net_private
    restart: always
    depends_on:
      - g7-backend

  g7-backend:
    build: .
    container_name: g7-backend
    expose:
      - "9000"
    volumes:
      - ./g7_src:/var/www/html
      - ./config/php-sessions.ini:/usr/local/etc/php/conf.d/sessions.ini
    environment:
      - DB_HOST=mariadb
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis-session
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - LDAP_HOST=openldap
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
    networks:
      - net_private
    restart: always
    depends_on:
      - mariadb
      - redis-session
      - openldap

  redis-session:
    image: redis:7-alpine
    container_name: cyberaudit-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./redis_data:/data
    networks:
      - net_private
    restart: always

  mariadb:
    image: mariadb:10.11
    container_name: cyberaudit-db
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - net_private
    restart: always
    healthcheck: 
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  openldap:
    image: osixia/openldap:latest
    container_name: cyberaudit-ldap
    environment:
      - LDAP_ORGANISATION=CyberAudit SaaS
      - LDAP_DOMAIN=g7.local
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
    volumes:
      - ./ldap_data:/var/lib/ldap
      - ./ldap_config:/etc/ldap/slapd.d  
    networks:
      - net_private
    restart: always

networks:
  net_public:
    driver: bridge
  net_private:
    driver: bridge
    internal: true

volumes:
  db_data:
  redis_data:
  ldap_data:
  ldap_config:
