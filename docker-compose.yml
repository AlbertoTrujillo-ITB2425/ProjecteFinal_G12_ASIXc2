version: '3.8'

services:

  s1_nginx:
    image: nginx:1.24-alpine
    container_name: s1_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www/html:ro
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx/grafana_ips.conf:/etc/nginx/conf.d/grafana_ips.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - net_public
      - net_private
    restart: always
    depends_on:
      - s2_node
      - s3_node
      - s8_grafana

  s2_node:
    build: { context: ., dockerfile: Dockerfile }
    container_name: s2_node
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
      - APP_DEBUG=${APP_DEBUG:-false}
      - MAIL_MBOX_PATH=/var/mail/root
      - SNORT_ALERT_PATH=/var/log/snort/alert
    volumes:
      - ./src:/var/www/html
      - php_sessions:/tmp
      - mail_data:/var/mail:ro
      - ./snort_logs:/var/log/snort:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - net_private
      - net_public
    restart: always
    depends_on:
      - s4_mariadb
      - s5_redis
      - s10_postfix

  s3_node:
    build: { context: ., dockerfile: Dockerfile }
    container_name: s3_node
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
      - APP_DEBUG=${APP_DEBUG:-false}
      - MAIL_MBOX_PATH=/var/mail/root
      - SNORT_ALERT_PATH=/var/log/snort/alert
    volumes:
      - ./src:/var/www/html
      - php_sessions:/tmp
      - mail_data:/var/mail:ro
      - ./snort_logs:/var/log/snort:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - net_private
      - net_public
    restart: always
    depends_on:
      - s4_mariadb
      - s5_redis
      - s10_postfix

  s4_mariadb:
    image: mariadb:10.11
    container_name: s4_mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - net_private
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  s5_redis:
    image: redis:7-alpine
    container_name: s5_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - ./redis_data:/data
    networks:
      - net_private
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  s6_openldap:
    image: osixia/openldap:1.5.0
    container_name: s6_openldap
    environment:
      - LDAP_ORGANISATION=CyberAudit Group 7
      - LDAP_DOMAIN=g7.local
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
      - LDAP_TLS=false
    volumes:
      - ./ldap_data:/var/lib/ldap
      - ./ldap_config:/etc/ldap/slapd.d
    networks:
      - net_private
      - net_public
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost:389 -b '' -s base '(objectclass=*)' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  s7_wazuh:
    image: wazuh/wazuh-manager:4.7.2
    container_name: s7_wazuh
    ports:
      - "1514:1514"
      - "55000:55000"
    environment:
      - INDEXER_URL=https://s7_wazuh:9200
    networks:
      - net_private
    restart: always

  s8_grafana:
    image: grafana/grafana:10.2.3
    container_name: s8_grafana
    user: "472"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-admin123}
      - GF_SERVER_DOMAIN=cyberpyme.es
      - GF_SERVER_ROOT_URL=https://cyberpyme.es/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SERVER_PROTOCOL=http
      - GF_SESSION_COOKIE_SECURE=true
      - GF_SESSION_COOKIE_SAMESITE=lax
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_GOOGLE_ENABLED=true
      - GF_AUTH_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GF_AUTH_GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GF_AUTH_GOOGLE_ALLOW_SIGN_UP=true
      - GF_AUTH_GOOGLE_ALLOWED_DOMAINS=itb.cat
      - GF_SERVER_ENABLE_GZIP=true
    volumes:
      - ./grafana_data:/var/lib/grafana
    networks:
      - net_private
      - net_public
    restart: always

  s9_scanner:
    build: .
    container_name: s9_scanner
    volumes:
      - ./src:/var/www/html
      - php_sessions:/tmp
    env_file: .env
    networks:
      - net_public
      - net_private
    cap_add:
      - NET_RAW
      - NET_ADMIN
    restart: always
    depends_on:
      - s4_mariadb

  s10_postfix:
    build: { context: ., dockerfile: Dockerfile.s10_s11 }
    container_name: s10_postfix
    ports:
      - "25:25"
      - "587:587"
    volumes:
      - mail_data:/var/mail
    environment:
      - MAIL_MBOX_PATH=/var/mail/root
    networks:
      - net_private
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/25' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  s11_snort:
    build: { context: ., dockerfile: Dockerfile.s10_s11 }
    container_name: s11_snort
    command: snort -A console -i eth0 -c /etc/snort/snort.conf
    volumes:
      - ./snort_logs:/var/log/snort
    environment:
      - SNORT_ALERT_PATH=/var/log/snort/alert
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - net_private
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pgrep snort || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  s12_ollama:
    image: ollama/ollama:latest
    container_name: s12_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    networks:
      - net_public
      - net_private
    restart: always

networks:
  net_public:
    driver: bridge
  net_private:
    driver: bridge
    internal: false

volumes:
  db_data:
  redis_data:
  ldap_data:
  ldap_config:
  grafana_data:
  ollama_data:
  php_sessions:
  mail_data:
