services:

  # S1: Gateway & Load Balancer
  s1_nginx:
    image: nginx:1.24-alpine
    container_name: s1_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www/html
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot
    networks:
      - net_public
      - net_private
    restart: always
    depends_on:
      - s2_node
      - s3_node

  # S2 & S3: Web Nodes (PHP-FPM)
  s2_node:
    build: .
    container_name: s2_node
    volumes:
      - ./src:/var/www/html
    networks:
      - net_public
      - net_private
    restart: always

  s3_node:
    build: .
    container_name: s3_node
    volumes:
      - ./src:/var/www/html
    networks:
      - net_public
      - net_private
    restart: always

  # S4: Database
  s4_mariadb:
    image: mariadb:10.11
    container_name: s4_mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - net_private
    restart: always

  # S5: Redis
  s5_redis:
    image: redis:7-alpine
    container_name: s5_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - net_private
    restart: always

  # S6: LDAP
  s6_openldap:
    image: osixia/openldap:1.5.0
    container_name: s6_openldap
    environment:
      - LDAP_ORGANISATION="CyberAudit Group 7"
      - LDAP_DOMAIN="g7.local"
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
    volumes:
      - ./ldap_data:/var/lib/ldap
    networks:
      - net_private
    restart: always

  # S7: SIEM (Wazuh)
  s7_wazuh:
    image: wazuh/wazuh-manager:4.7.2
    container_name: s7_wazuh
    ports:
      - "1514:1514"
      - "55000:55000"
    networks:
      - net_private
    restart: always

  # S8: Grafana
  s8_grafana:
    image: grafana/grafana:10.2.3
    container_name: s8_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-admin123}
    networks:
      - net_private
    restart: always


  # S9: Scanner
  s9_scanner:
    build: .
    container_name: s9_scanner
    volumes:
      - ./src:/var/www/html
    env_file: .env
    networks:
      - net_public
      - net_private
    cap_add:
      - NET_RAW
      - NET_ADMIN
    restart: always

  # S10: Postfix
  s10_postfix:
    build:
      context: .
      dockerfile: Dockerfile.s10_s11
    container_name: s10_postfix
    ports:
      - "25:25"
      - "587:587"
    volumes:
      - ./mail_logs:/var/log/mail
    networks:
      - net_private
    restart: always

  # S11: Snort
  s11_snort:
    build:
      context: .
      dockerfile: Dockerfile.s10_s11
    container_name: s11_snort
    command: snort -A console -i eth0 -c /etc/snort/snort.conf
    volumes:
      - ./snort_logs:/var/log/snort
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - net_private
    restart: always

  # S12: Ollama AI Engine
  s12_ollama:
    image: ollama/ollama:latest
    container_name: s12_ollama
    volumes:
        - ./ollama_data:/root/.ollama
    ports:
      - "11434:11434"  # <--- ESTO PERMITE QUE EL NAVEGADOR ACCEDA
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=* # <--- ESTO EVITA BLOQUEOS DE NAVEGADOR (CORS)
    networks:
      - net_private
      - net_public   # <--- AÑADE ESTO SI NGINX NECESITA VERLO TAMBIÉN
    restart: always

networks:
  net_public:
    driver: bridge
  net_private:
    driver: bridge
