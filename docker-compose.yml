version: '3.8'

# Plantilla base para los nodos de aplicación
x-app-base: &app_base
  build: .
  restart: always
  networks:
    - net_private
  volumes:
    - ./g7_src:/var/www/html
    - ./config/php-sessions.ini:/usr/local/etc/php/conf.d/sessions.ini
  environment:
    - DB_HOST=s4_mariadb
    - DB_NAME=${DB_NAME}
    - DB_USER=${DB_USER}
    - DB_PASSWORD=${DB_PASSWORD}
    - REDIS_HOST=s5_redis
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - LDAP_HOST=s6_openldap
    - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}

services:

  s1_nginx:
    image: nginx:1.24-alpine
    container_name: s1_nginx
    ports:
      - "80:80"
    volumes:
      - ./g7_src:/var/www/html:ro
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - net_public
      - net_private
    restart: always
    depends_on:
      - s2_node
      - s3_node

  s2_node:
    <<: *app_base
    container_name: s2_node

  s3_node:
    <<: *app_base
    container_name: s3_node

  s4_mariadb:
    image: mariadb:10.11
    container_name: s4_mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - net_private
    restart: always

  s5_redis:
    image: redis:7-alpine
    container_name: s5_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - net_private
    restart: always

  s6_openldap:
    image: osixia/openldap:latest
    container_name: s6_openldap
    environment:
      - LDAP_ORGANISATION="CyberAudit Group 7"
      - LDAP_DOMAIN="g7.local"
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
    volumes:
      - ./ldap_data:/var/lib/ldap
    networks:
      - net_private
    restart: always

  s7_wazuh:
    image: wazuh/wazuh-odfe:latest
    container_name: s7_wazuh
    networks:
      - net_private
    ports:
      - "1514:1514"
      - "55000:55000"

  s8_grafana:
    image: grafana/grafana:latest
    container_name: s8_grafana
    networks:
      - net_private

networks:
  net_public:
    driver: bridge
  net_private:
    driver: bridge
    internal: true
