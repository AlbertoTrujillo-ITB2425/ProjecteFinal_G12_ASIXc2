upstream php_nodes {
    server s2_node:9000;
    server s3_node:9000;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    # Cambiado a index.php que es el que tienes en g7_src
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Nodo de escaneo S9
    location ~ ^/scanner\.php(/|$) {
        fastcgi_pass s9_scanner:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Nodos generales S2 y S3
    location ~ \.php$ {
        fastcgi_pass php_nodes;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
    }
}
