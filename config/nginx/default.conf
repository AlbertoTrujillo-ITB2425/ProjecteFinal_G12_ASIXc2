# --- 1. CLUSTER DE PROCESAMIENTO ---
upstream backend_cluster {
    # ip_hash asegura persistencia de sesión por IP
    ip_hash; 
    
    server s2_node:9000;
    server s3_node:9000;
    
    keepalive 32;
}

# --- 2. REDIRECCIÓN HTTP A HTTPS ---
server {
    listen 80;
    server_name cyberpyme.es;
    
    # Necesario para el reto de Certbot/LetsEncrypt si no usas Cloudflare para el SSL
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- 3. CONFIGURACIÓN PRINCIPAL HTTPS ---
server {
    listen 443 ssl;
    server_name cyberpyme.es;

    root /var/www/html;
    index index.php;

    # DNS interno de Docker (importante para resolver nombres de contenedores)
    resolver 127.0.0.11 valid=30s;

    # Certificados SSL
    ssl_certificate /etc/letsencrypt/live/cyberpyme.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cyberpyme.es/privkey.pem;

    # Seguridad SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Cabeceras de Seguridad
    add_header X-Backend-Server $upstream_addr;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # --- GESTIÓN DE ERRORES ---
    error_page 403 /errors/error_403.html;
    location = /errors/error_403.html {
        internal;
    }

    # --- BLOQUE: GRAFANA (REVERSE PROXY) ---
    # Acceso vía https://cyberpyme.es/grafana/
    location /grafana/ {
        # RESTRICCIÓN DE IP (Ajusta estas IPs a las tuyas)
        allow 1.2.3.4;      # Tu IP de casa
        allow 5.6.7.8;      # IP de la Universidad/Oficina
        deny all;           # Bloquea al resto del mundo

        proxy_pass http://s8_grafana:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts para evitar desconexiones en dashboards pesados
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_redirect off;
    }

    # --- BLOQUE: API DEL ESCÁNER (s9) ---
    location ^~ /api/scan_async.php {
        include fastcgi_params;
        fastcgi_pass s9_scanner:9000;
        
        fastcgi_param SCRIPT_FILENAME /var/www/html/api/scan_async.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html;
        fastcgi_param HTTPS on;

        fastcgi_read_timeout 600s;
        fastcgi_buffering off;
    }

    # --- BLOQUE: PROCESAMIENTO PHP GENERAL ---
    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass backend_cluster;
        
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;

        fastcgi_next_upstream error timeout invalid_header http_500 http_503;
        fastcgi_next_upstream_tries 2;
        fastcgi_read_timeout 60s;
    }

    # Manejo de archivos estáticos y rutas amigables
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Bloqueo de archivos críticos
    location ~ /\.(ht|git|env|config) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
