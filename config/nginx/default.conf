# =========================================================================
# SOC CYBERPYME - CONFIGURACIÓN PROFESIONAL NGINX
# =========================================================================

# --- 1. UPSTREAMS (Balanceo y Persistencia) ---
upstream backend_cluster {
    ip_hash; 
    server s2_node:9000;
    server s3_node:9000;
    keepalive 32;
}

# --- 2. HTTP: REDIRECCIÓN GLOBAL A HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name cyberpyme.es www.cyberpyme.es;

    # Validación de Certbot (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- 3. HTTPS: SERVIDOR PRINCIPAL ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cyberpyme.es www.cyberpyme.es;

    root /var/www/html;
    index index.php index.html;

    # DNS Interno Docker
    resolver 127.0.0.11 valid=30s;

    # --- SEGURIDAD SSL (Hardening) ---
    ssl_certificate /etc/letsencrypt/live/cyberpyme.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cyberpyme.es/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- CABECERAS DE SEGURIDAD ---
    add_header X-Backend-Server $upstream_addr always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "upgrade-insecure-requests" always;

    # --- BLOQUE: GRAFANA (Optimizado) ---
    location /grafana/ {
        allow 79.117.174.171;
        # Proxy hacia el contenedor s8
        proxy_pass http://s8_grafana:3000/;
        
        # Reescritura de cabeceras para evitar bucles de Cloudflare
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Configuración para Dashboards Pesados
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_redirect off;
        
        # Acceso controlado: descomenta las siguientes líneas tras las pruebas
        deny all;
    }

    # --- BLOQUE: API SCANNER ASYNC (s9) ---
    location ^~ /api/scan_async.php {
        include fastcgi_params;
        fastcgi_pass s9_scanner:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        
        # Tiempo extendido para escaneos largos
        fastcgi_read_timeout 900s;
        fastcgi_buffering off;
    }

    # --- BLOQUE: PHP-FPM (Cluster s2/s3) ---
    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass backend_cluster;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;

        # Optimización de respuesta
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        
        # Tolerancia a fallos en el cluster
        fastcgi_next_upstream error timeout invalid_header http_500 http_503;
        fastcgi_next_upstream_tries 2;
    }

    # --- GENERAL ---
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Denegar acceso a archivos sensibles
    location ~ /\.(ht|git|env|config|sql|sh) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Gestión de Errores
    error_page 403 /error_403.html;
    location = /error_403.html {
        root /var/www/html/errors;
        internal;
    }
}
