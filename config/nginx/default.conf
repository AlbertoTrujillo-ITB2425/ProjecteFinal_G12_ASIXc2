# --- 1. CLUSTER DE PROCESAMIENTO (Optimizado con Sticky Sessions) ---
upstream backend_cluster {
    # ip_hash asegura que un mismo auditor (IP) siempre caiga en el mismo nodo
    # Esto soluciona el bucle de "Cerrar Sesión" involuntario.
    ip_hash; 
    
    server s2_node:9000;
    server s3_node:9000;
    
    keepalive 32;
}

# --- 2. REDIRECCIÓN HTTP A HTTPS ---
server {
    listen 80;
    server_name cyberpyme.es;
    
    # Redirección limpia
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- 3. CONFIGURACIÓN PRINCIPAL HTTPS ---
server {
    listen 443 ssl;
    server_name cyberpyme.es;

    root /var/www/html;
    index index.php;

    # DNS interno de Docker
    resolver 127.0.0.11 valid=30s;

    # Certificados SSL
    ssl_certificate /etc/letsencrypt/live/cyberpyme.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cyberpyme.es/privkey.pem;

    # Seguridad SSL Robusta
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Cabeceras de Seguridad
    add_header X-Backend-Server $upstream_addr;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Manejo de peticiones y archivos
    location / {
        # Esta línea evita bucles si el archivo no existe físicamente
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- BLOQUE: API DEL ESCÁNER (s9) ---
    location ^~ /api/scan_async.php {
        include fastcgi_params;
        fastcgi_pass s9_scanner:9000;
        
        fastcgi_param SCRIPT_FILENAME /var/www/html/api/scan_async.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html;
        fastcgi_param HTTPS on;

        # Timeouts largos para Nmap
        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;
        
        # Optimización de Buffers para output pesado
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_buffering off;
    }

    # --- BLOQUE: PROCESAMIENTO PHP GENERAL ---
    location ~ \.php$ {
        # Antes de pasar a PHP, verificamos que el archivo exista
        try_files $uri =404;

        include fastcgi_params;
        fastcgi_pass backend_cluster;
        
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param HTTPS on;

        # Reintento inteligente si un nodo falla
        fastcgi_next_upstream error timeout invalid_header http_500 http_503;
        fastcgi_next_upstream_tries 2;
        
        fastcgi_read_timeout 60s;
        
        # Evitar el error "headers already sent" por buffering
        fastcgi_intercept_errors on;
    }

    # Bloqueo de seguridad para archivos críticos
    location ~ /\.(ht|git|env|config) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
