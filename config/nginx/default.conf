# =========================================================================
# SOC CYBERPYME - CONFIGURACIÓN INTEGRAL v9.0 (FINAL OPTIMIZED)
# =========================================================================

# --- 1. UPSTREAMS ---
upstream backend_cluster {
    ip_hash; 
    server s2_node:9000;
    server s3_node:9000;
}

# --- 2. REDIRECCIÓN HTTP -> HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name cyberpyme.es www.cyberpyme.es;
    
    # Necesario para la renovación de certificados Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- 3. SERVIDOR PRINCIPAL (HTTPS) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cyberpyme.es www.cyberpyme.es;

    ssl_certificate /etc/letsencrypt/live/cyberpyme.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cyberpyme.es/privkey.pem;

    root /var/www/html;
    index index.php index.html;

    # --- ACCESO A GRAFANA (PRIORIDAD ABSOLUTA) ---
    # El prefijo ^~ evita que las reglas de abajo (como la de .js) capturen tráfico de Grafana
    location ^~ /grafana/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Como usas GF_SERVER_SERVE_FROM_SUB_PATH=true, pasamos la ruta tal cual
        proxy_pass http://s8_grafana:3000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Tiempos de espera extendidos para dashboards pesados
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # --- REGLA: SCANNER & AI API (Contenedor s9_scanner) ---
    location ~* ^/(modules/scanner|api)/.*\.php$ {
        include fastcgi_params;
        fastcgi_pass s9_scanner:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_param PHP_VALUE "session.save_path=/tmp";
        fastcgi_read_timeout 300s;
    }

    # --- REGLA GENERAL: RESTO DE PHP (Cluster s2 y s3) ---
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass backend_cluster;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_param PHP_VALUE "session.save_path=/tmp";
    }

    # --- GESTIÓN DE ARCHIVOS ESTÁTICOS (SOLO WEB PRINCIPAL) ---
    # Esta regla NO afectará a /grafana/ gracias al ^~ de arriba
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 24h;
        access_log off;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # --- GESTIÓN DE RUTAS POR DEFECTO ---
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Cabeceras de Seguridad
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
}
