# --- 1. CLUSTER DE PROCESAMIENTO (Load Balancing) ---
# Distribuye el tráfico general entre s2 y s3
upstream backend_cluster {
    server s2_node:9000;
    server s3_node:9000;
    keepalive 32;
}

# --- 2. REDIRECCIÓN HTTP A HTTPS ---
server {
    listen 80;
    server_name cyberpyme.es;
    return 301 https://$host$request_uri;
}

# --- 3. CONFIGURACIÓN PRINCIPAL HTTPS ---
server {
    listen 443 ssl;
    server_name cyberpyme.es;

    root /var/www/html;
    index index.php;

    # DNS interno de Docker (Crucial para resolver 's9_scanner')
    resolver 127.0.0.11 valid=30s;

    # Certificados SSL
    ssl_certificate /etc/letsencrypt/live/cyberpyme.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cyberpyme.es/privkey.pem;

    # Seguridad y Optimización SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Cabecera para saber qué contenedor responde (Debug)
    add_header X-Backend-Server $upstream_addr;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- BLOQUE DE ALTA PRIORIDAD: API DEL ESCÁNER (s9) ---
    # Usamos ^~ para que esta regla mande sobre cualquier otra de PHP
    location ^~ /api/scan_async.php {
        include fastcgi_params;
        fastcgi_pass s9_scanner:9000;
        
        fastcgi_param SCRIPT_FILENAME /var/www/html/api/scan_async.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html;
        fastcgi_param HTTPS on;

        # Evitar el Error 503/504 por respuestas grandes o lentas de Nmap
        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;
        fastcgi_connect_timeout 60s;

        # Ajuste de Buffers (Nmap genera mucho texto de salida)
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        
        # Desactivar el buffer de proxy para ver el output más rápido
        fastcgi_buffering off;
    }

    # --- RESTO DE PHP (Balanceado entre s2 y s3) ---
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass backend_cluster;
        
        fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/html;
        fastcgi_param HTTPS on;

        # Reintento si un nodo del cluster está caído
        fastcgi_next_upstream error timeout invalid_header http_500 http_503;
        fastcgi_next_upstream_tries 2;
        
        fastcgi_read_timeout 60s;
    }

    # Bloqueo de seguridad para archivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
