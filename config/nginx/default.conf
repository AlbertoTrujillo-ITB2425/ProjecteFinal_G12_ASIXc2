# =========================================================================
# SOC CYBERPYME - CONFIGURACIÓN INTEGRAL v7.5 (SESSION & AI OPTIMIZED)
# =========================================================================

# --- 1. FIREWALL DE IP ---
map $http_cf_connecting_ip $grafana_access {
    default 1; 
}

# --- 2. UPSTREAMS (Nodos Web Principales) ---
upstream backend_cluster {
    ip_hash; 
    server s2_node:9000;
    server s3_node:9000;
}

# --- 3. REDIRECCIÓN HTTP -> HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name cyberpyme.es www.cyberpyme.es;
    return 301 https://$host$request_uri;
}

# --- 4. SERVIDOR PRINCIPAL (HTTPS) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cyberpyme.es www.cyberpyme.es;

    ssl_certificate /etc/letsencrypt/live/cyberpyme.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cyberpyme.es/privkey.pem;

    root /var/www/html;
    index index.php index.html;

    # --- ACCESO A GRAFANA ---
    location /grafana/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_pass http://s8_grafana:3000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- REGLA CRÍTICA: SCANNER & AI API (Contenedor s9_scanner) ---
    location ~* ^/(modules/scanner|api)/.*\.php$ {
        include fastcgi_params;
        fastcgi_pass s9_scanner:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;

        # Forzar el uso de la carpeta de sesión compartida
        fastcgi_param PHP_VALUE "session.save_path=/tmp";

        # Timeouts para procesos largos de Nmap y Gemma2:2b
        fastcgi_read_timeout 300s;
        proxy_read_timeout 300s;
    }

    # --- REGLA GENERAL: RESTO DE PHP (Nodos s2 y s3) ---
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass backend_cluster;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        
        # Sincronización de sesión con el cluster
        fastcgi_param PHP_VALUE "session.save_path=/tmp";
    }

    # --- GESTIÓN DE ARCHIVOS ESTÁTICOS ---
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 24h;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
